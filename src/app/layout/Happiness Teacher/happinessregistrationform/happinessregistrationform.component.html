<section class="registration-section">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-xl-9 col-lg-10">
                <div class="card shadow-lg border-0">

                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0 text-center">Happiness Teacher Registration</h4>
                    </div>

                    <div class="card-body p-4">

                        <form [formGroup]="teacherForm" (ngSubmit)="submitForm()">

                            <!-- PERSONAL INFORMATION -->
                            <h5 class="section-title">Personal Information</h5>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label>Teacher Name <span style="color: red;">*</span></label>
                                    <input type="text" class="form-control" placeholder="Enter Teacher Name"
                                        formControlName="teachername">

                                    <div class="text-danger" *ngIf="f.teachername.touched && f.teachername.errors">
                                        Teacher Name is required
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label>Mobile No <span style="color: red;">*</span></label>

                                    <input type="text" class="form-control" placeholder="Enter Mobile No"
                                        formControlName="mobileno">

                                    <div class="text-danger" *ngIf="f.mobileno.touched && f.mobileno.errors">
                                        Enter valid mobile number
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <label>Email <span style="color: red;">*</span></label>

                                    <input type="email" class="form-control" placeholder="Enter Email"
                                        formControlName="email">

                                    <div class="text-danger" *ngIf="f.email.touched && f.email.errors">
                                        Email is required
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <label>Gender <span style="color: red;">*</span></label>

                                    <select class="form-control" formControlName="gender">
                                        <option value="">Select</option>
                                        <option>Male</option>
                                        <option>Female</option>
                                        <option>Other</option>
                                    </select>

                                    <div class="text-danger" *ngIf="f.gender.touched && f.gender.errors">
                                        Gender is required
                                    </div>
                                </div>

                            </div>

                            <hr>

                            <!-- SCHOOL INFORMATION -->

                            <h5>School Information</h5>

                            <div class="row mb-3">

                                <div class="col-md-4">
                                    <label>State <span style="color: red;">*</span></label>

                                    <select class="form-control" formControlName="state"
                                        (change)="onStateChange($event.target.value)">

                                        <option value="">Select</option>

                                        <option *ngFor="let s of state" [value]="s.column2">
                                            {{s.column2}}
                                        </option>

                                    </select>

                                    <div class="text-danger" *ngIf="f.state.touched && f.state.errors">
                                        State is required
                                    </div>
                                </div>


                                <div class="col-md-4">
                                    <label>District <span style="color: red;">*</span></label>

                                    <select class="form-control" formControlName="district"
                                        (change)="onDistrictChange($event.target.value)">

                                        <option value="">Select</option>

                                        <option *ngFor="let d of district" [value]="d.column2">
                                            {{d.column2}}
                                        </option>

                                    </select>

                                    <div class="text-danger" *ngIf="f.district.touched && f.district.errors">
                                        District is required
                                    </div>
                                </div>


                                <div class="col-md-4">
                                    <label>City <span style="color: red;">*</span></label>

                                    <select class="form-control" formControlName="city"
                                        (change)="onCityChange($event.target.value)">

                                        <option value="">Select</option>

                                        <option *ngFor="let c of city" [value]="c.column2">
                                            {{c.column2}}
                                        </option>

                                    </select>

                                    <div class="text-danger" *ngIf="f.city.touched && f.city.errors">
                                        City is required
                                    </div>
                                </div>

                            </div>


                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label>School Name <span style="color: red;">*</span></label>
                                    <select class="form-control" formControlName="schoolname"
                                        (change)="onSchoolChange($event.target.value)">
                                        <option value="">Select</option>
                                        <option *ngFor="let s of school" [value]="s.column1">
                                            {{s.column1}}
                                        </option>
                                    </select>
                                    <div class="text-danger" *ngIf="f.schoolname.touched && f.schoolname.errors">
                                        School Name is required
                                    </div>
                                </div>


                                <div class="col-md-3">
                                    <label>UDISE No</label>

                                    <input class="form-control" formControlName="udiseno" placeholder="UDISE" readonly>
                                </div>


                                <!-- STANDARD CHECKBOX GRID -->

                                <div class="col-md-3">
                                    <label>
                                        Which standards are you teaching Happiness Literacy? <span style="color: red;">*</span>
                                    </label>

                                    <div class="standard-grid">

                                        <label class="standard-option" *ngFor="let option of standardOptions">

                                            <input type="checkbox" [checked]="isStandardSelected(option)"
                                                (change)="toggleStandard(option,$any($event.target).checked)">

                                            Std {{option}}

                                        </label>

                                    </div>

                                    <div class="text-danger" *ngIf="f.standard.touched && f.standard.errors">

                                        Standard is required

                                    </div>
                                </div>

                            </div>

                            <hr>

                            <div class="text-center mt-4">

                                <button class="btn btn-primary px-5" type="submit"
                                    [disabled]="teacherForm.invalid || isSubmitting">

                                    {{isSubmitting ? 'Submitting...' : 'Submit Registration'}}

                                </button>

                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
