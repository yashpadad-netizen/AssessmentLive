<section class="registration-section">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-xl-9 col-lg-10">
                <div class="card shadow-lg border-0">

                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0 text-center">Teacher Registration - Happiness Literacy Program</h4>
                    </div>

                    <div class="card-body p-4">

                        <form [formGroup]="teacherForm" (ngSubmit)="submitForm()">

                            <!-- PERSONAL INFORMATION -->
                            <h5 class="section-title">Personal Information</h5>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label>First Name <span style="color: red;">*</span></label>
                                    <input type="text" class="form-control" placeholder="Enter First Name"
                                        formControlName="firstname">

                                    <div class="text-danger" *ngIf="f.firstname.touched && f.firstname.errors">
                                        First Name is required
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <label>Middle Name <span style="color: red;">*</span></label>
                                    <input type="text" class="form-control" placeholder="Enter Middle Name"
                                        formControlName="middlename">

                                    <div class="text-danger" *ngIf="f.middlename.touched && f.middlename.errors">
                                        Middle Name is required
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <label>Last Name <span style="color: red;">*</span></label>
                                    <input type="text" class="form-control" placeholder="Enter Last Name"
                                        formControlName="lastname">

                                    <div class="text-danger" *ngIf="f.lastname.touched && f.lastname.errors">
                                        Last Name is required
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label>Mobile No <span style="color: red;">*</span></label>

                                    <input type="text" class="form-control" placeholder="Enter Mobile No"
                                        formControlName="mobileno">

                                    <div class="text-danger" *ngIf="f.mobileno.touched && f.mobileno.errors">
                                        Enter valid mobile number
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <label>Email <span style="color: red;">*</span></label>

                                    <input type="email" class="form-control" placeholder="Enter Email"
                                        formControlName="email">

                                    <div class="text-danger" *ngIf="f.email.touched && f.email.errors">
                                        Email is required
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <label>Gender <span style="color: red;">*</span></label>

                                    <select class="form-control" formControlName="gender">
                                        <option value="">Select</option>
                                        <option>Male</option>
                                        <option>Female</option>
                                        <option>Other</option>
                                    </select>

                                    <div class="text-danger" *ngIf="f.gender.touched && f.gender.errors">
                                        Gender is required
                                    </div>
                                </div>

                            </div>

                            <hr>

                            <!-- SCHOOL INFORMATION -->

                            <h5>School Information</h5>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label>UDISE No <span style="color: red;">*</span></label>

                                    <input class="form-control" formControlName="udiseno" placeholder="UDISE"
                                        (change)="onUdiseChange($event.target.value)">
                                </div>

                                <div class="col-md-6">
                                    <label>School Name</label>

                                    <input class="form-control" formControlName="schoolname" placeholder="School Name"
                                        readonly>
                                </div>

                            </div>

                            <div class="row mb-3">

                                <div class="col-md-4">
                                    <label>State</label>

                                    <input class="form-control" formControlName="state" placeholder="State" readonly>
                                </div>

                                <div class="col-md-4">
                                    <label>District</label>

                                    <input class="form-control" formControlName="district" placeholder="District"
                                        readonly>
                                </div>

                                <div class="col-md-4">
                                    <label>City</label>

                                    <input class="form-control" formControlName="city" placeholder="City" readonly>
                                </div>

                            </div>

                            <div class="row mb-3">
                                <!-- STANDARD CHECKBOX GRID -->

                                <div class="col-md-12">
                                    <label>
                                        Which standards are you teaching Happiness Literacy? <span
                                            style="color: red;">*</span>
                                    </label>

                                    <div class="standard-grid">

                                        <label class="standard-option" *ngFor="let option of standardOptions">

                                            <input type="checkbox" [checked]="isStandardSelected(option)" 
                                                (change)="toggleStandard(option,$any($event.target).checked)">

                                            Std {{option}}

                                        </label>

                                    </div>

                                    <div class="text-danger" *ngIf="f.standard.touched && f.standard.errors">

                                        Standard is required

                                    </div>
                                </div>

                            </div>

                            <hr>

                            <div class="text-center mt-4">

                                <button class="btn btn-primary px-5" type="submit"
                                    [disabled]="teacherForm.invalid || isSubmitting">

                                    {{isSubmitting ? 'Submitting...' : 'Submit Registration'}}

                                </button>

                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
