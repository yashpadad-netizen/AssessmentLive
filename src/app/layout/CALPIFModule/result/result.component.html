<div class="text-center">


</div>

<div class="container">
  <div class="row" *ngIf="((programid == 'P6') || (certificateStatus)) ">
    <div class="col-lg-2">
      <button type="button" class="btn btn-success m-2" (click)="Certificate()">Download Certificate</button>
    </div>
  </div>
  <br>
  <div class="card card-default mb-3" style="padding: 20px; border:  1px solid black;">
    <div class="row ">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12" style="text-align: center;">
        <!-- <img src="/assets/images/digital-sakshar-new-website-logo.png" alt="Logo" class="img-responsive"  width="55%"> -->
        <h3> Result</h3>
      </div>
    </div>
    <hr>
    <div class="row">
      <div class="col-md-6 col-lg-6 col-sm-12 col-xs-12">
        <div class="row form-group">
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 first">
            <b>Learner Name : </b>
          </div>
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 second">
            {{FullName}}
          </div>
        </div>
        <div class="row form-group">
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 first">
            <b>Total Marks: </b>
          </div>
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 second">
            {{totalmarks}}
          </div>
        </div>
        <div class="row form-group">
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 first">
            <b>Obtained Marks: </b>
          </div>
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 second">
            {{examscore}}
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-6 col-sm-12 col-xs-12">
        <div class="row form-group">
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 first">
            <b> Exam: </b>
          </div>
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 second">
            {{coursename}}
          </div>
        </div>
        <div class="row form-group">
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 first">
            <b>Percentage: </b>
          </div>
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 second">
            {{percentage| number:'1.0-2'}}%
          </div>
        </div>
        <div class="row form-group">
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 first">
            <b>Grade: </b>
          </div>
          <div class="col-lg-6 col-md-6 col-sm-12 col-xs-12 second">
            {{grade}}
          </div>
        </div>
      </div>

    </div>
    <div class="text-center">
      <button type="button" class="btn btn-success m-2" *ngIf="userattempt < 3" (click)="Reexam()">Re-Exam</button>
    </div>
  </div>

  <br>
  <div class="text-center">
    <h4
      *ngIf="newexamuserattempt == 0 && (newexamcoursename == 'Introduction to Artificial Intelligence' || newexamcoursename == 'Introduction to Generative Artificial Intelligence' || newexamcoursename == 'STD 1 - Language Baseline' ||newexamcoursename == 'STD 1 - Maths Baseline' || newexamcoursename == 'STD 2 - Language Baseline' ||newexamcoursename == 'STD 2 - Maths Baseline' || newexamcoursename == 'STD 3 - Language Baseline' ||newexamcoursename == 'STD 3 - Maths Baseline' || newexamcoursename == 'STD 4 - Language Baseline' ||newexamcoursename == 'STD 4 - Maths Baseline' || newexamcoursename == 'STD 1 - Language Midline' ||newexamcoursename == 'STD 1 - Maths Midline' || newexamcoursename == 'STD 2 - Language Midline' ||newexamcoursename == 'STD 2 - Maths Midline' || newexamcoursename == 'STD 3 - Language Midline' ||newexamcoursename == 'STD 3 - Maths Midline' || newexamcoursename == 'STD 4 - Language Midline' ||newexamcoursename == 'STD 4 - Maths Midline')">
      <b><a style="color: #2199e8;cursor: pointer;">{{subject}} Assessment pending, Click here to start now.</a></b>
    </h4><br>
    <button class="btn btn-primary " type="button" (click)="dashboard()">Start Exam</button>
  </div>
</div>
